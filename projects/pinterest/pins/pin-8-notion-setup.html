<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1000px; height: 1500px; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; }
.pin { width: 1000px; height: 1500px; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 80px; position: relative; }
.accent-line { width: 120px; height: 6px; background: #ff6b6b; margin-bottom: 60px; }
.label { font-size: 26px; color: #ff6b6b; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 600; }
.headline { font-size: 78px; font-weight: 400; color: #2d3748; margin-bottom: 70px; text-align: center; line-height: 1.2; letter-spacing: -1px; }
.steps { display: flex; flex-direction: column; gap: 50px; margin-bottom: 80px; width: 100%; max-width: 700px; }
.step { display: flex; align-items: flex-start; gap: 30px; }
.step-num { width: 56px; height: 56px; background: #1e3a8a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; font-weight: 700; flex-shrink: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.step-text { font-size: 36px; color: #2d3748; padding-top: 8px; }
.step-sub { font-size: 26px; color: #718096; margin-top: 6px; }
.cta { background: #2d3748; color: #f8f9fa; font-size: 36px; font-weight: 400; padding: 28px 65px; border-radius: 8px; display: inline-block; letter-spacing: 1px; }
.brand { position: absolute; bottom: 60px; font-size: 28px; color: #2d3748; font-weight: 400; letter-spacing: 0.5px; opacity: 0.7; }
</style></head><body>
<div class="pin">
  <div class="accent-line"></div>
  <div class="label">How-To Guide</div>
  <h1 class="headline">Set Up Your<br>Freelance Finances<br>in Notion</h1>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div><div class="step-text">Duplicate the template</div><div class="step-sub">One click to your workspace</div></div></div>
    <div class="step"><div class="step-num">2</div><div><div class="step-text">Add your first client</div><div class="step-sub">Name, rate, contact info</div></div></div>
    <div class="step"><div class="step-num">3</div><div><div class="step-text">Create your first invoice</div><div class="step-sub">Auto-calculates totals</div></div></div>
  </div>
  <div class="cta">GET THE FREE TEMPLATE</div>
  <div class="brand">Jeff the Notion Guy</div>
</div>
</body></html>
