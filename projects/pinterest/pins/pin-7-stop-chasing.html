<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1000px; height: 1500px; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; }
.pin { width: 1000px; height: 1500px; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 80px; position: relative; }
.accent-line { width: 120px; height: 6px; background: #ff6b6b; margin-bottom: 60px; }
.headline { font-size: 82px; font-weight: 400; color: #2d3748; margin-bottom: 50px; text-align: center; line-height: 1.2; letter-spacing: -1px; }
.subhead { font-size: 36px; color: #718096; text-align: center; margin-bottom: 80px; line-height: 1.5; max-width: 750px; }
.stats { display: flex; gap: 80px; margin-bottom: 80px; }
.stat { text-align: center; }
.stat-num { font-size: 72px; font-weight: 700; color: #1e3a8a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin-bottom: 10px; }
.stat-label { font-size: 28px; color: #718096; }
.cta { background: #2d3748; color: #f8f9fa; font-size: 36px; font-weight: 400; padding: 28px 65px; border-radius: 8px; display: inline-block; letter-spacing: 1px; }
.brand { position: absolute; bottom: 60px; font-size: 28px; color: #2d3748; font-weight: 400; letter-spacing: 0.5px; opacity: 0.7; }
</style></head><body>
<div class="pin">
  <div class="accent-line"></div>
  <h1 class="headline">Stop Chasing<br>Late Payments</h1>
  <p class="subhead">The Notion template that tracks every invoice, client, and dollar — so you don't have to.</p>
  <div class="stats">
    <div class="stat"><div class="stat-num">2 min</div><div class="stat-label">Setup Time</div></div>
    <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Free to Start</div></div>
  </div>
  <div class="cta">DOWNLOAD FREE</div>
  <div class="brand">Jeff the Notion Guy</div>
</div>
</body></html>
