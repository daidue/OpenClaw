<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1000px; height: 1500px; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; }
.pin { width: 1000px; height: 1500px; background: #1e3a8a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 80px; position: relative; }
.accent-line { width: 120px; height: 6px; background: #ff6b6b; margin-bottom: 60px; }
.label { font-size: 26px; color: #ff6b6b; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 600; }
.headline { font-size: 82px; font-weight: 400; color: #f8f9fa; margin-bottom: 70px; text-align: center; line-height: 1.2; letter-spacing: -1px; }
.features { display: flex; flex-direction: column; gap: 40px; margin-bottom: 80px; width: 100%; max-width: 700px; }
.feature { display: flex; align-items: center; gap: 25px; font-size: 36px; color: #f8f9fa; }
.check { width: 48px; height: 48px; border: 3px solid #ff6b6b; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff6b6b; font-size: 28px; font-weight: bold; flex-shrink: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.price-row { display: flex; align-items: baseline; gap: 20px; margin-bottom: 40px; }
.price { font-size: 96px; font-weight: 700; color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.price-note { font-size: 28px; color: #a0b4d0; }
.cta { background: #ff6b6b; color: #ffffff; font-size: 36px; font-weight: 600; padding: 28px 65px; border-radius: 8px; display: inline-block; letter-spacing: 1px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.brand { position: absolute; bottom: 60px; font-size: 28px; color: #a0b4d0; font-weight: 400; letter-spacing: 0.5px; }
</style></head><body>
<div class="pin">
  <div class="accent-line"></div>
  <div class="label">Pro Template</div>
  <h1 class="headline">The Professional<br>Freelancer's<br>Toolkit</h1>
  <div class="features">
    <div class="feature"><div class="check">✓</div><div>23 Pre-built Clients</div></div>
    <div class="feature"><div class="check">✓</div><div>24 Sample Invoices</div></div>
    <div class="feature"><div class="check">✓</div><div>Expense Dashboard</div></div>
    <div class="feature"><div class="check">✓</div><div>Payment Status Tracking</div></div>
    <div class="feature"><div class="check">✓</div><div>18 Custom Page Covers</div></div>
  </div>
  <div class="price-row"><div class="price">$27</div><div class="price-note">one-time</div></div>
  <div class="cta">GET THE TOOLKIT</div>
  <div class="brand">Jeff the Notion Guy</div>
</div>
</body></html>
